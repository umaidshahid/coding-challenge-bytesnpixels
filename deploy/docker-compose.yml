services:
  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      # Provide a real secret in a .env file or your deployment environment.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment}
      FAKE_LLM: ${FAKE_LLM:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PULSE_DB_PATH: /data/pulse.db
      PORT: 4000
    volumes:
      - pulse-data:/data
    restart: unless-stopped

  proxy:
    build:
      context: ..
      dockerfile: web/Dockerfile
    environment:
      # Set to your domain (e.g. pulse.example.com) for automatic HTTPS.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${PROXY_PORT:-8080}:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pulse-data:
